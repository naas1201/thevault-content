name: Build dossiers

on:
  push:
    paths:
      - "content/**"
      - "scripts/**"
      - "build.config.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scaffold missing episode folders from RSS
        run: node scripts/scaffold-from-rss.mjs

      - name: Build manifest + dossiers from content/
        run: node scripts/build.mjs

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json dossiers/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild dossiers from content"
            git push
          fi